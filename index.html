<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <meta content="email=no" name="format-detection">
    <title data-i18n="index.title">首页</title>
    <style type="text/css">
        html { font-size: 35px; }
    </style>
    <link rel="stylesheet" type="text/css" href="./static/css/common.css">
    <script type="text/javascript" src="./static/js/bignumber.min.js"></script>
    <link rel="stylesheet" type="text/css" href="./static/css/swiper.min.css" />
    <style type="text/css">
        body { background: #110e1f; overflow: auto; }
        span { display: inline-block; }
        .ad { width: 100%; margin: 0 auto; font-size: 0; }
        .swiper-container2 .swiper-slide { line-height: 0; }
        .swiper-container2 .swiper-slide img { width: 100%; }
        #d1 { 
            position: absolute; top: 110px; left: 20px;

            text-align: center;

        }
        .mp {
            line-height: 30px;
            height: 368px;
            overflow-y: scroll;
        }
        .mp img { width: 100%; }
        .redbox {
            height: 40px;
            margin: 0 auto;
            text-align: center;
            margin-top: 8px;
        }
        .redbox .btn {
            width: 100px;
            margin: 0 auto;
            text-align: center;
            display: block;
            height: 35px;
            line-height: 35px;
            color: #fff;
            border-radius: 31px;

        }

</head>
<body>
    <div id="app">
        <div class="ad">
            <div class="swiper-container swiper-container2">
                <div class="swiper-wrapper">
                    <!-- Banner内容将通过JS动态生成 -->
                </div>
            </div>
        </div>
        <div class="box">
            <div class="jun-content">
                <div class="t_box slide">
                    <div class="t_table">
                        <ul class="t_lineher">
                            <li data-i18n="index.products.hotProducts">热门产品</li>
                            <li data-i18n="index.products.latest">最新</li>
                            <li data-i18n="index.products.status">状态</li>
                        </ul>
                        <div class="t_con_home">
                            <!-- 产品列表将通过JS动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="footer">
                <div>
                    <a href="./index.html" class="t_span one">
                        <i></i>
                        <span data-i18n="nav.home">首页</span>
                    </a>
                </div>
                <div>
                    <a href="./recharge.html" class="t_span two">
                        <i></i>
                        <span data-i18n="nav.recharge">充值</span>
                    </a>
                </div>
                <div>
                    <a href="hold.html" class="t_span three">
                        <i></i>
                        <span data-i18n="nav.hold">持仓</span>
                    </a>
                </div>
                <div>
                    <a onClick="" class="t_span four">
                        <i></i>
                        <span data-i18n="nav.customerService">客服</span>
                    </a>
                </div>
                <div>
                    <a href="./user.html" class="t_span five">
                        <i></i>
                        <span data-i18n="nav.my">我的</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="d1" class="cox xs" style="display: none;">
        <div class="tc">
           <input type="submit" 
                   value="X" 
                   class="btn btn1 close" 
                   id="sday4"
                   style="position:absolute;right:10px;top:10px;font-size:20px;display:block;width:25px;height:25px;"
           
                   value="X">
		
            <div class="tc1" data-i18n="index.announcement">最新公告</div>
            <div class="mp">
                <!-- 公告内容将通过JS动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 添加i18n.js -->
    <script src="./static/js/i18n.js"></script>
    <script src="./static/js/jquery-1.9.1.min.js"></script>
    <script src="./static/js/swiper.min.js"></script>
	
    <script src="./static/js/ajaxUtil.js"></script>
    <script src="./static/js/utils.js"></script>
    <script type="text/javascript">
		// let isInit=true
		getUserInfo()
        $(function() {
            // 初始化语言
            const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
            I18n.init(savedLang).then(() => {
                console.log('语言初始化完成:', I18n.currentLang);
                // setInterval(loadHomeData,1000)
				loadHomeData()
            });
            
            // 监听语言变化
    //         $(document).on('languageChanged', function(event, lang) {
    //             console.log('语言已切换到:', lang);
				// setInterval(loadHomeData,1000)
                
    //         });
            
            // 高亮当前导航
            var nav = "index";
            if (nav == "index") {
                $(".one").addClass("router-link-exact-active");
            }
            
            // 关闭公告弹窗
            $("#sday4").click(function() {
                $("#d1").hide();
            });
        });
        
        function loadHomeData() {
			console.log(AjaxUtil)
            AjaxUtil.get('/index/index/home',{loadingHide:true}).then(res => {
                if(res.code == 1) {
                    // 设置公告
				
						
						
						// 生成Banner
						let swiperHtml = '';
						res.data.banner.forEach(item => {
						    swiperHtml += `<div class="swiper-slide">
						        <a href="${item.url || '#'}">
						            <img src="${baseConfig.baseUrl + item.path}" />
						        </a>
						    </div>`;
						});
						$(".swiper-wrapper").html(swiperHtml);
						
						// 初始化Swiper
						var swiper2 = new Swiper('.swiper-container2', {
						    loop: true,
						    autoplay: { delay: 3000 },
						    pagination: { el: '.swiper-pagination' }
						});
				
                    
                    
                    // 生成产品列表
                    let productHtml = '';
                    $.each(res.data.product, function(k, v) {
					
                        const statusText = (v.isclosetime == 1||v.isopen==0) ? 
                            I18n.t('index.products.closed') : 
                            I18n.t('index.products.trading');
                        const statusColor = (v.isclosetime == 1||v.isopen==0) ? 'rgb(58, 142, 230)' : 'red';
                        
                        productHtml += `<ul style="background-image: url('./static/img/bg.png'); background-repeat: no-repeat;"
                            onclick='window.location.href="./goods.html?id=${v.id}"'>
                            <li>
                                <a href="./goods.html?id=${v.id}">
                                    <span>
                                        <img src="${baseConfig.baseUrl + v.img}" alt="" lazy="loaded">
                                    </span>
                                </a>
                                <div>
                                    <i class="identifying" style="display: none;"></i>
                                    <span>${v.title}</span>
                                    <span>${v.code}</span>
                                </div>
                            </li>
                            <li>
                                <span style="background-color: rgb(38, 168, 72);" id="p_${v.id}">
                                    ${v.Price}
                                </span>
                            </li>
                            <li>
                                <a href="./goods.html?id=${v.id}">
                                    <span class="t_status" style="background: ${statusColor}">
                                        ${statusText}
                                    </span>
                                </a>
                            </li>
                            <li>
                                <a href="./goods.html?id=${v.id}">
                                    <i></i>
                                </a>
                            </li>
                        </ul>`;
                    });
                    $(".t_con_home").html(productHtml);
                    
                    // 显示公告弹窗
					let noticeContent=localStorage.getItem('noticeContent')
                    if(res.data.ater && res.data.ater.content) {
						if(noticeContent!=res.data.ater.content){
							$(".tc1").text(res.data.ater.title || I18n.t('index.announcement'));
							$(".mp").html(res.data.ater.content || '');
							localStorage.setItem('noticeContent',res.data.ater.content)
							$("#d1").show();
						}
                        
                    }
                }
            })
        }
        
        // 实时更新价格
        function getdt() {
			AjaxUtil.get('/index/index/ajaxdataNew',{loadingHide:true,timestamp: Date.now()}).then(datajson=>{
				if(datajson.code==1){
					var pro = datajson.data;
					$.each(pro, function(k, v) {
					    const id = '#p_' + v.id;
					    const pdid = '#pd_' + v.id;
					    $(id).html(v.Price);
					    
					    if (v.is_rise == 2) {
					        $(id).css('background', 'rgb(255, 1, 5)');
					    } else {
					        $(id).css('background', 'rgb(38, 168, 72)');
					    }
					    
					    if (v.is_deal == 0) {
					        $(pdid).css('background', 'rgb(58, 142, 230)');
					        $(pdid).html(I18n.t('index.products.closed'));
					    } else {
					        $(pdid).html(I18n.t('index.products.trading'));
					    }
					});
				}
				
			})
            // $.get('/index/index/ajaxdata', '',
            //     function(datajson) {
            //         var pro = eval('(' + datajson + ')');
            //         $.each(pro, function(k, v) {
            //             const id = '#p_' + v.id;
            //             const pdid = '#pd_' + v.id;
            //             $(id).html(v.Price);
                        
            //             if (v.is_rise == 2) {
            //                 $(id).css('background', 'rgb(255, 1, 5)');
            //             } else {
            //                 $(id).css('background', 'rgb(38, 168, 72)');
            //             }
                        
            //             if (v.is_deal == 0) {
            //                 $(pdid).css('background', 'rgb(58, 142, 230)');
            //                 $(pdid).html(I18n.t('index.products.closed'));
            //             } else {
            //                 $(pdid).html(I18n.t('index.products.trading'));
            //             }
            //         });
            //     });
        }
        
        // 可选：开启实时价格更新
        // getdt();
        window.setInterval("getdt()", 1000);
    </script>
</body>
</html>
