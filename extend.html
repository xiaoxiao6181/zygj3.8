<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0;" name="viewport" />
    <title data-i18n="recommend.promotionRecords">推广记录</title>
    <link rel="stylesheet" type="text/css" href="./static/css/header.css" />
    <script type="text/javascript" src="./static/js/yatongle.js"></script>
    <link rel="stylesheet" type="text/css" href="./static/css/iconfont.css" />
    <style>
        .container { width: 100%; height: 100%; padding: 0; display: -webkit-box;
        display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-flow:
        column; flex-flow: column; } .main { flex: 1; padding: .4rem; background-color:
        #FAFAFA; } .cont { padding: .3rem 0; border-radius: 22px; background-color:
        #FFFFFF; } .cont .ctitle { padding: .25rem 0; font-size: .28rem; line-height:
        1; color: #4A4A4A; display: -webkit-flex; display: flex; } .cont .ctitle
        .item:first-child { flex: 1; text-align: center; padding: 0 .4rem; } .cont
        .ctitle .item:last-child { width: 3.1rem; text-align: center; padding:
        0 .4rem; } .cont .name-time { padding: .25rem 0; display: -webkit-flex;
        display: flex; font-size: .28rem; line-height: 1.6; color: #9B9B9B; } .cont
        .name-time .name { flex: 1; overflow: hidden; white-space: nowrap; text-overflow:
        ellipsis; padding: 0 .4rem; } .cont .name-time .time { width: 3.1rem; padding:
        0 .4rem; } .cont .line { width: 5.9rem; background-color: #F5F5F5; margin-top:
        .2rem; } .cont .more { font-size: .24rem; line-height: .34rem; color: #999999;
        text-align: center; padding-top: .28rem; padding-bottom: .16rem; } .main
        .cont .detail-status { font-size: .24rem; line-height: .34rem; color: #9B9B9B;
        } .main .cont .detail-status .investDeatil { margin-left: 0.5rem; color:
        #FCCF61; padding-right: 1rem; } .main .cont .detail-status .agreement {
        color: #57B8FF; } .main .cont .detail-status .status { float: right; }
        .main .cont .detail-status { font-size: .24rem; line-height: .34rem; color:
        #9B9B9B;} .main .cont .detail-status .investDeatil { margin-left:0.5rem;color:
        #FCCF61; padding-right: 1rem;} .main .cont .detail-status .agreement {
        color: #57B8FF;} .main .cont .detail-status .status { float: right;} .item_box
        { border-bottom: 0.01rem solid #eee; padding-bottom: 0.2rem; background-color:
        #fff; } .item { width: 95%; display: flex; justify-content: space-between;
        margin: 0rem auto 0.2rem; } .flex { display: flex; margin-top: 0.1rem;
        } .item1 { width: 95%; display: flex; justify-content: space-between; margin:
        auto; } .time { color: #999; font-size: 0.25rem; } .flex a{ color:#4f5ffa
        } .item .flex .title{ width:220px; text-overflow :ellipsis; white-space
        :nowrap; overflow : hidden; } .more{ font-size: .24rem; line-height: .34rem;
        color: #999999; text-align: center; padding-top: .28rem; padding-bottom:
        .16rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="left" onclick="window.history.back()">
            <i class="iconfont icon-arrow-left"></i>
        </div>
        <div class="htitle" data-i18n="recommend.promotionRecords">推广记录</div>
    </div>
    <div class="box_list"></div>
    <div class="more" data-i18n="recommend.noMoreRecords">暂无更多记录</div>
    
    <!-- 添加i18n.js -->
    <script src="./static/js/i18n.js"></script>
    <script type="text/javascript" src="/static/js/font.js"></script>
    <script src="./static/js/jquery-1.9.1.min.js"></script>
    <script src="./static/js/ajaxUtil.js"></script>
    
    <script>
        $(function() {
            // 初始化语言
            const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
            I18n.init(savedLang).then(() => {
                loadPromotionRecords();
            });
            
            // 监听语言变化
            $(document).on('languageChanged', function(event, lang) {
                // 页面静态文本会自动更新，动态数据保持不变
                loadPromotionRecords();
            });
        });
        
        function loadPromotionRecords() {
            AjaxUtil.get('/index/user/extend').then(res=>{
                if(res.code==1){
                    let box_list_html='';
                    res.data.results.forEach(item=>{
                        // 使用动态数据，服务端返回的文本保持不变
                        box_list_html += `
                            <div class="item_box">
                                <div class="item">
                                    <div class="flex">
                                        <p style="font-size: 0.3rem; color: black;">
                                            ${item.name || ''}
                                        </p>
                                    </div>
                                    <p style="color: rgb(153, 153, 153);margin-top: 0.15rem; font-size: 0.25rem;">
                                        ${I18n.t('recommend.registerDate')}：${item.time || ''}
                                    </p>
                                </div>
                                <div class="item1">
                                    <p style="color: orange;font-size: 0.25rem;">
                                        ${I18n.t('recommend.rechargeAmount')}：${item.recharge || 0} ${I18n.t('common.yuan')}
                                    </p>
                                    <p style="color: green;font-size: 0.25rem;">
                                        ${I18n.t('recommend.withdrawAmount')}：${item.cash || 0} ${I18n.t('common.yuan')}
                                    </p>
                                </div>
                            </div>`;
                    });
                    $(".box_list").html(box_list_html);
                }
            });
        }
    </script>
</body>
</html>
