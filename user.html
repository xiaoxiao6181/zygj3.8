                <!-- 添加i18n.js -->
                <script src="./static/js/i18n.js"></script>

                <script src="./static/js/ajaxUtil.js"></script>
                <script src="./static/js/utils.js"></script>
                
                <script type="text/javascript">
					
                    $(function() {
                        // 初始化语言
                        const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
                        I18n.init(savedLang).then(() => {
                            console.log('语言初始化完成:', I18n.currentLang);
                            loadUserInfo();
                        });
                        
                        // 监听语言变化
                        $(document).on('languageChanged', function(event, lang) {
                            console.log('语言已切换到:', lang);
                        });
                        
                        // 高亮当前导航
                        var nav = "user";
                        highlightNav(nav);
                    });
                    
                    async function loadUserInfo() {
                        try {
                            const userInfo = await getUserInfo();
                            $("#name").text(userInfo.name || '');
                            // $("#level_name").text(userInfo.level_name || '');
                            $("#money").text(formatCurrency(userInfo.money || 0));
                            $("#give_money").text(formatCurrency(userInfo.give_money || 0));
							
                        } catch (error) {
                            console.error('加载用户信息失败:', error);
                            $("#name").text('用户');
                            $("#money").text('0.00');
                            $("#give_money").text('0.00');
                        }
                    }
          
					function logout() {
						let code=localStorage.getItem('code')
					    localStorage.clear();
						if(code){
							localStorage.setItem('code',code)
						}
					    location.href = './login.html';
					}
                    function formatCurrency(amount) {
                        if (typeof amount !== 'number') {
                            amount = parseFloat(amount) || 0;
                        }
                        return amount.toFixed(2);
                    }
                    
                    function highlightNav(nav) {
                        $(".t_span").removeClass("router-link-exact-active");
                        if (nav == "index") {
                            $(".one").addClass("router-link-exact-active");
                        }
                        if (nav == "recharge") {
                            $(".two").addClass("router-link-exact-active");
                        }
                        if (nav == "hold") {
                            $(".three").addClass("router-link-exact-active");
                        }
                        if (nav == "yeb") {
                            $(".four").addClass("router-link-exact-active");
                        }
                        if (nav == "user") {
                            $(".five").addClass("router-link-exact-active");
                        }
                    }
                    
                    // 确保getUserInfo函数存在
                    if (typeof getUserInfo !== 'function') {
                        async function getUserInfo() {
                            try {
                                const response = await AjaxUtil.get('/index/user/getUserInfo');
                                if (response.code == 1) {
                                    return response.data || {};
                                }
                                return {};
                            } catch (error) {
                                console.error('获取用户信息失败:', error);
                                return {};
                            }
                        }
                    }
                </script>
