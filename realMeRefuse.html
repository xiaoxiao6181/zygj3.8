<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=381, height=765, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>实名认证状态</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<style>
			body {
				width: 381px;
				height: 765px;
				background-color: #F8F9FB;
				margin: 0;
				padding: 0;
				overflow: hidden;
				font-family: PingFang SC, 'Microsoft YaHei', sans-serif;
			}

			.nav-bar {
				height: 44px;
				background-color: #ffffff;
				display: flex;
				align-items: center;
				justify-content: center;
				border-bottom: 1px solid #E5E5E5;
			}

			.nav-title {
				font-size: 17px;
				font-weight: 600;
				color: #000000;
			}

			.status-icon-container {
				width: 84px;
				height: 84px;
				background-color: #FFF0F0;
				border-radius: 50%;
				margin: 40px auto 20px auto;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.status-text {
				font-size: 18px;
				font-weight: 600;
				color: #E02020;
				text-align: center;
				margin-bottom: 12px;
			}

			.status-desc {
				font-size: 12px;
				color: #999999;
				text-align: center;
				margin-bottom: 30px;
			}

			.reason-card {
				background-color: #FFF0F0;
				border-radius: 8px;
				margin: 0 16px;
				padding: 20px 18px;
			}

			.reason-title {
				font-size: 14px;
				font-weight: 600;
				color: #C0392B;
				margin-bottom: 12px;
			}

			.reason-content {
				font-size: 12px;
				color: #666666;
				line-height: 1.6;
				margin-bottom: 20px;
				text-align: justify;
			}

			.btn-group {
				display: flex;
				justify-content: space-between;
				gap: 10px;
			}

			.btn-outline {
				flex: 1;
				height: 36px;
				background-color: #ffffff;
				border-radius: 4px;
				border: 1px solid #E5E5E5;
				font-size: 14px;
				color: #333333;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
			}

			.btn-primary {
				flex: 1;
				height: 36px;
				background-color: #3B82F6;
				border-radius: 4px;
				font-size: 14px;
				color: #ffffff;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
			}

			.info-list {
				margin: 16px;
				background-color: #ffffff;
				border-radius: 8px;
				padding: 0 16px;
			}

			.info-item {
				height: 50px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				border-bottom: 1px solid #F5F5F5;
			}

			.info-item:last-child {
				border-bottom: none;
			}

			.info-label {
				font-size: 14px;
				color: #666666;
			}

			.info-value {
				font-size: 14px;
				color: #333333;
			}
		</style>
	</head>
	<body style="overflow: auto;">
		<div class="nav-bar">
			<div class="back-icon" onClick="javascript:history.back()" data-x="16" data-y="18">
			    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
			        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
			    </svg>
			</div>
			<span class="nav-title" data-x="159" data-y="15">实名认证</span>
		</div>
		<div class="content">
			<div class="status-icon-container" data-x="148" data-y="80"><svg width="40" height="40" viewBox="0 0 40 40"
					fill="none" xmlns="http://www.w3.org/2000/svg">
					<path
						d="M20 0C8.96 0 0 8.96 0 20C0 31.04 8.96 40 20 40C31.04 40 40 31.04 40 20C40 8.96 31.04 0 20 0ZM18 30V26H22V30H18ZM18 10V22H22V10H18Z"
						fill="#FFFFFF" fill-opacity="0.2"></path>
				</svg></div>
			<div class="status-text" data-x="129" data-y="180">实名认证未通过</div>
			<div class="status-desc" data-x="86" data-y="210">很抱歉，您提交的认证信息未通过审核</div>
			<div class="reason-card" data-x="16" data-y="268">
				<div class="reason-title" data-x="59" data-y="288">审核未通过原因</div>
				<div class="reason-content" data-x="59" data-y="318">身份及照片不清晰，请重新上传清晰的证件照片。照片需要能够清楚辨识所有信息，确保四角完整，无反光和遮挡。
				</div>
				<div class="btn-group">
					<div class="btn-outline" data-x="35" data-y="388">联系客服</div>
					<div class="btn-primary" data-x="196" data-y="388">重新认证</div>
				</div>
			</div>
			<div class="info-list" data-x="16" data-y="454">
				<div class="info-item"><span class="info-label" data-x="55" data-y="471">提交时间</span><span
						class="info-value" data-x="212" data-y="471">2024-01-20 14:30:25</span></div>
				<div class="info-item"><span class="info-label" data-x="55" data-y="521">审核时间</span><span
						class="info-value" data-x="212" data-y="521">2024-01-20 15:45:12</span></div>
			</div>
		</div>
	</body>
</html>
